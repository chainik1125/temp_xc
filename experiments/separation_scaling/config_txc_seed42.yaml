experiment_name: separation_scaling_txc_seed42
description: |
  Add TXC to the seed=42 head-to-head: run TXC at main-config settings on
  the cached transformer activations from results_protocol_compare/.
  Same transformer as T-SAE Paper / MatTXC ran against, so the resulting
  TXC vs T-SAE numbers are apples-to-apples on identical activations.

seed: 42

generator:
  type: mess3_shared
  sweep:
    parameter: delta
    values: [0.0, 0.05, 0.1, 0.15, 0.2]
  fixed_params:
    base_x: 0.25
    base_a: 0.6
    parameterization: symmetric_line

transformer:
  n_layers: 3
  d_model: 64
  n_heads: 2
  d_head: 32
  d_mlp: 256
  n_ctx: 128
  act_fn: gelu
  normalization_type: LN
  attention_dir: causal
  default_prepend_bos: false
  init_mode: gpt2
  initializer_range: 1.0e-3
  probe_layer: 1
  probe_hook_name: blocks.1.hook_resid_post
  extract_batch_size: 16
  load_if_exists: true                # use the cached transformer.pt
  training:
    steps: 20000
    batch_size: 128
    lr: 1.0e-3
    data_chunks: 4
    data_chunk_size: 5000

architectures:
  - name: "TXC"
    family: txc
    kwargs:
      dict_size: 64
      k: 1
      window_size: 30
      temporal_steps: 3000
      n_sequences: 1000
      seq_len: 128

probes:
  dense_linear: {enabled: false}
  dense_mlp: {enabled: false}

probe_dataset:
  train_sequences: 1000
  eval_sequences: 500
  train_seed: 10042
  eval_seed: 20042

output_root: results_protocol_compare    # appends TXC to existing per-cell results
