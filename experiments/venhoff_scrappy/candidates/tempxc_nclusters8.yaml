# Screening: tempxc at n_clusters=8. Part of the 3 × 3 factorial
# on (arch, n_clusters) at scrappy budget.

name: tempxc_nclusters8
arch: tempxc
baseline: baseline_sae
reuse_venhoff_vectors: false
phase2_steering:
  n_clusters: 8
hypothesis: |
  Does n_clusters=8 materially help tempxc? Paper uses 15 by default.
  If coarser (4) matches 15, cluster count isn't the dominant axis for
  tempxc. If fine-grained (15) dominates, the arch is cluster-limited.
