# Scrappy defaults for venhoff_scrappy autoresearch.
# Candidates in candidates/*.yaml inherit from here and override individual keys.
#
# These settings are ~30x smaller than the paper budget, targeting
# <10 min wall-clock per Phase 0→3 cycle on a single H100 (or ~20 min on A40).

model:
  thinking: deepseek-ai/DeepSeek-R1-Distill-Llama-8B
  base: meta-llama/Llama-3.1-8B
  steering_layer: 12
  sae_layer: 6

phase0_activations:
  # Phase 0 (trace collection + activation extraction) is expensive and
  # doesn't vary across cycles sharing the same (thinking_model, dataset,
  # steering_layer). scripts/phase0_bootstrap.sh runs it once on pod;
  # cycles symlink the cached artifacts in.
  n_traces: 200           # paper: 400-500; scrappy cuts Phase 0 to ~20 min
  reuse_existing: true

phase2_steering:
  # Compared to paper App C.1 (max_iters=50, n_training_examples=2048):
  max_iters: 5
  n_training_examples: 128
  optim_minibatch_size: 6
  lr: 1e-2
  # Venhoff ships cluster-SAEs at n_clusters ∈ {5, 10, 15, 20, ..., 50}
  # for llama-8b layer6. Default to smallest shipped value for fastest
  # scrappy cycles; screening factorial sweeps {5, 10, 15}.
  n_clusters: 5            # paper: 15
  reduction: sum           # TempXC-specific; one of {sum, mean, max}

phase3_hybrid:
  dataset: math500
  dataset_split: test
  n_tasks: 20              # paper: 500
  # Deterministic task selection across all candidates so paired
  # Δ analysis holds. "first_n" = MATH500.test[:20]. "stratified_by_level"
  # = 4 tasks per difficulty level when tags available (preferred).
  slice_strategy: stratified_by_level
  slice_fallback: first_n
  max_new_tokens: 500      # paper: 2000
  max_thinking_tokens: 500 # paper: 2000
  coefficients: [0.5]      # paper: [0.1, 0.2, ..., 1.0]
  token_windows: [0, -15]  # paper: [0, -1, -15, -50, -100]

grade:
  judge_model: claude-haiku-4-5-20251001
  judge_repetitions: 1     # paper: 1 (already minimal)
  # thinking_acc and base_acc are constants across candidates on a
  # fixed slice — cache them to cut judge calls from 60 → 20 per cycle.
  cache_thinking_base_grades: true

autoresearch:
  default_baseline: baseline_sae
  seed: 42
  # Verdict thresholds on Δ Gap Recovery (pp) — web-claude revision:
  # paired Δ SE at n=20 is ~±10–15 pp, not ±22 (denominator + task
  # correlation cancel). +10 pp is borderline but defensible with
  # mandatory n=100 re-run for FINALISTs before paper-budget promotion.
  finalist_threshold_pp: 10.0
  promising_threshold_pp: 3.0   # accumulate; 3-consec triggers re-run
  discard_threshold_pp: -10.0
  stop_after_n_stale_cycles: 5

# Per-cycle timeout (bash kills stuck cycles and emits FAILED row):
cycle_timeout_s: 1800    # 30 min (3× expected 10 min)

# Schema versioning on ledger rows.
ledger_schema_version: 1
