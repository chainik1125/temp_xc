[project]
name = "temp-xc"
version = "0.1.0"
description = "Temporal crosscoders / temporal-SAE research"
requires-python = ">=3.12"

# Runtime deps. Version floors are the oldest we've tested; uv.lock
# pins exact versions for reproducibility. If you hit a compat error,
# prefer updating uv.lock over tightening these ranges.
dependencies = [
    # Core ML
    "torch>=2.8,<2.10",
    "transformers>=4.57",
    "transformer-lens>=2.17",
    "sae-lens>=6.35",
    "datasets>=4.5",
    "huggingface-hub>=0.36",
    "accelerate>=1.12",
    "sentencepiece>=0.2",
    "safetensors>=0.7",
    "einops>=0.8",

    # Numerical / data
    "numpy>=2.1",
    "scipy>=1.16",
    "scikit-learn>=1.7",
    "pandas>=2.2",
    "umap-learn>=0.5",

    # Plotting
    "matplotlib>=3.10",
    "seaborn>=0.13",
    "plotly>=6.5",
    "kaleido>=1.2",

    # Config / utilities
    "hydra-core>=1.3",
    "omegaconf>=2.3",
    "pyyaml>=6.0",
    "tqdm>=4.67",
    "python-dotenv>=1.0",
    "wandb>=0.24",

    # Autointerp (Claude API)
    "anthropic>=0.40",
]

[dependency-groups]
dev = [
    "pytest>=9.0",
    "pytest-timeout>=2.4",
    "ipykernel>=6.0",
]

[tool.uv.sources]
torch = { index = "pytorch-cu128" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.setuptools.packages.find]
# Reusable backend lives under src/; experiments/ and references/ at the
# repo root are intentionally NOT packaged (experiments are one-off
# scripts, references/ is vendored paper code).
where = ["."]
include = ["src*"]
exclude = ["*.model_cache*", "docs*", "results*", "experiments*", "references*"]
