[project]
name = "temp-xc"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "torch>=2.8,<2.10",
    "transformers",
    "accelerate",
    "datasets",
    "huggingface-hub",
    "sentencepiece",
    "protobuf",
    "tqdm",
    "plotly",
    "kaleido",
    "scipy",
    "scikit-learn",
    "numpy",
    "anthropic",
    "matplotlib",
]

[dependency-groups]
dev = [
    "pytest",
]

[tool.uv.sources]
torch = { index = "pytorch-cu128" }

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
