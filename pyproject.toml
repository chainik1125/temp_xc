[project]
name = "temp-xc"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.0",
    "sae-lens>=4.0",
    "transformer-lens",
    "scipy",
    "matplotlib",
    "plotly",
    "tqdm",
    "numpy",
    "seaborn",
    "safetensors",
    "anthropic",
    # EleutherAI delphi (SOTA auto-interp pipeline, Paulo et al. ICLR 2025)
    # Not on PyPI under its canonical name; installed from source.
    "eai-delphi @ git+https://github.com/EleutherAI/delphi",
]

[tool.setuptools.packages.find]
include = ["src*", "temporal_crosscoders*"]

[dependency-groups]
dev = [
    "pytest",
]
