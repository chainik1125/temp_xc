[project]
name = "temp-xc"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "torch>=2.0",
    "sae-lens>=4.0",
    "transformer-lens",
    "scipy",
    "matplotlib",
    "plotly",
    "tqdm",
    "numpy",
    "seaborn",
]

[tool.setuptools.packages.find]
include = ["src*"]

[dependency-groups]
dev = [
    "pytest",
]
